<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Thanks | Terra Design</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fbf7f2 0%, #f7efe4 100%);
        color: #1c1612;
        font-family: "DM Sans", sans-serif;
      }

      .card {
        max-width: 620px;
        width: 100%;
        padding: 42px 32px;
        border-radius: 28px;
        background: rgba(255, 253, 249, 0.82);
        border: 1px solid rgba(232, 221, 208, 0.9);
        box-shadow: 0 24px 60px rgba(28, 22, 18, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
        font-family: "Libre Baskerville", serif;
      }

      p {
        margin: 0 auto 22px;
        max-width: 46ch;
        line-height: 1.8;
        color: #7d7068;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 15px 24px;
        border-radius: 999px;
        text-decoration: none;
        background: linear-gradient(135deg, #c96b3c, #8a6fa8);
        color: #fffdf9;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thanks for reaching out.</h1>
      <p>Your enquiry has been sent. Terra will review it and get back to you with a practical next step, timeline, and quote.</p>
      <a href="/">Back to Terra</a>
    </main>
  </body>
</html>
